name: '🔎 Gemini Review'

on:
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: 'Any additional context from the request'
        required: false
      pull_request_number:
        type: 'string'
        description: 'The pull request number'
        required: false

concurrency:
  group: '${{ github.workflow }}-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 7
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ vars.APP_ID }}
        uses: 'actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf' # ratchet:actions/create-github-app-token@v2
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-contents: 'read'
          permission-issues: 'write'
          permission-pull-requests: 'write'

      - name: 'Checkout repository'
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8' # ratchet:actions/checkout@v6
        with:
          persist-credentials: 'false'

      - name: 'Pre-pull GitHub MCP Server image'
        run: docker pull ghcr.io/github/github-mcp-server:v0.27.0

      - name: 'Prepare prompt context'
        shell: 'bash'
        run: |-
          mkdir -p .gemini
          jq -n \
            --arg repo "${REPOSITORY}" \
            --arg pr "${PULL_REQUEST_NUMBER}" \
            --arg context "${ADDITIONAL_CONTEXT}" \
            '{repository: $repo, pull_request_number: $pr, additional_context: $context}' > .gemini/context.json
        env:
          REPOSITORY: '${{ github.repository }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          ADDITIONAL_CONTEXT: '${{ inputs.additional_context }}'

      - name: 'Run Gemini pull request review'
        uses: 'google-github-actions/run-gemini-cli@v0' # ratchet:exclude
        id: 'gemini_pr_review'
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          NODE_NO_WARNINGS: '1'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_debug: 'true'
          gemini_model: "${{ vars.GEMINI_MODEL || 'gemini-1.5-flash' }}"
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS }}'
          workflow_name: 'gemini-review'
          # Explicitly set the PR number to handle `issue_comment` triggers (which GitHub treats as issues, not PRs)
          github_pr_number: '${{ inputs.pull_request_number || github.event.pull_request.number || github.event.issue.number }}'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": false,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": []
              }
            }
          extensions: |
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          prompt: '/pr-code-review'

      - name: 'Verify Gemini CLI execution'
        shell: bash
        run: |
          if [ -f gemini-artifacts/stdout.log ]; then
            if ! jq -e . gemini-artifacts/stdout.log >/dev/null 2>&1; then
              echo "::error::Gemini CLI stdout was not valid JSON"
              exit 1
            fi
            if jq -e '.error' gemini-artifacts/stdout.log >/dev/null 2>&1; then
              ERROR_MSG=$(jq -r '.error.message // "Unknown error"' gemini-artifacts/stdout.log)
              echo "::error title=Gemini CLI reported error::${ERROR_MSG}"
              exit 1
            fi
          fi
          if [ -f gemini-artifacts/stderr.log ]; then
            if ! jq -e . gemini-artifacts/stderr.log >/dev/null 2>&1; then
              echo "::error::Gemini CLI stderr was not valid JSON"
              exit 1
            fi
            if jq -e '.error' gemini-artifacts/stderr.log >/dev/null 2>&1; then
              ERROR_MSG=$(jq -r '.error.message // "Unknown error"' gemini-artifacts/stderr.log)
              echo "::error title=Gemini CLI reported stderr error::${ERROR_MSG}"
              exit 1
            fi
          fi
